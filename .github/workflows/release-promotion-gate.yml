name: release-promotion-gate

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: release-promotion-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-promotion-gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: sqlite+pysqlite:///${{ github.workspace }}/apps/backend/agent1.db
      AGENT1_AUDIT_ENVIRONMENT: ci
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend[dev]"

      - name: Apply database migrations
        run: |
          cd apps/backend
          alembic upgrade head

      - name: Release promotion gate
        run: python tests/operations/release_promotion_gate.py
