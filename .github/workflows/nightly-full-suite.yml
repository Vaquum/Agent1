name: nightly-full-suite

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: nightly-full-suite-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Backend quality gates
        run: |
          python ../../tests/operations/permission_matrix_validation.py
          python ../../tests/operations/protected_mutation_approval_validation.py
          python ../../tests/operations/event_journal_chain_validation.py
          python ../../tests/operations/workflow_supply_chain_validation.py
          python ../../tests/operations/dependency_vulnerability_gate.py --ecosystem python
          ruff check .
          MYPYPATH=src mypy -p agent1
          pytest -q

  frontend-full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.6.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Frontend quality gates
        run: |
          python tests/operations/dependency_vulnerability_gate.py --ecosystem node
          pnpm --filter @agent1/frontend lint
          pnpm --filter @agent1/frontend typecheck
          pnpm --filter @agent1/frontend test
          pnpm --filter @agent1/frontend build

  frontend-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.6.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @agent1/frontend exec playwright install --with-deps chromium

      - name: Playwright smoke
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: nightly-playwright-junit.xml
          PLAYWRIGHT_JUNIT_OUTPUT_DIR: test-results
        run: pnpm --filter @agent1/frontend exec playwright test --project=chromium --reporter=line,junit,html

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nightly-frontend-playwright
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results
          retention-days: 14

      - name: Nightly Playwright failure summary
        if: failure()
        run: |
          echo "## Nightly Playwright Failure" >> "$GITHUB_STEP_SUMMARY"
          echo "- Job: frontend-playwright" >> "$GITHUB_STEP_SUMMARY"
          echo "- Artifacts: nightly-frontend-playwright" >> "$GITHUB_STEP_SUMMARY"
          echo "- Action: inspect uploaded playwright-report and test-results artifacts." >> "$GITHUB_STEP_SUMMARY"

  scenario-full-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend[dev]"

      - name: Scenario harness
        run: python tests/scenarios/run.py

  operational-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Operational readiness gate
        run: python tests/operations/run.py

  live-sandbox-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend[dev]"

      - name: Live sandbox smoke
        env:
          AGENT1_LIVE_GITHUB_TOKEN: ${{ secrets.AGENT1_LIVE_GITHUB_TOKEN }}
          AGENT1_LIVE_REPOSITORY: Vaquum/Agent1
          AGENT1_LIVE_REQUIRED: 'true'
        run: python tests/live/run.py
