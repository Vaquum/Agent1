name: pr-gates

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gates-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade setuptools
          pip install -e ".[dev]"
          pip install pip-audit

      - name: Ruff
        run: ruff check .

      - name: Mypy
        run: MYPYPATH=src mypy -p agent1

      - name: Permission matrix validation
        run: python ../../tests/operations/permission_matrix_validation.py

      - name: Protected mutation approval validation
        run: python ../../tests/operations/protected_mutation_approval_validation.py

      - name: Event journal chain validation
        run: python ../../tests/operations/event_journal_chain_validation.py

      - name: Retention policy validation
        run: python ../../tests/operations/retention_policy_validation.py

      - name: Workflow supply-chain validation
        run: python ../../tests/operations/workflow_supply_chain_validation.py

      - name: Python dependency vulnerability gate
        run: python ../../tests/operations/dependency_vulnerability_gate.py --ecosystem python

      - name: Pytest
        run: pytest -q

  frontend-quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.6.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Node dependency vulnerability gate
        run: python tests/operations/dependency_vulnerability_gate.py --ecosystem node

      - name: Frontend lint
        run: pnpm --filter @agent1/frontend lint

      - name: Frontend typecheck
        run: pnpm --filter @agent1/frontend typecheck

      - name: Frontend tests
        run: pnpm --filter @agent1/frontend test

      - name: Frontend build
        run: pnpm --filter @agent1/frontend build

  frontend-playwright:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.6.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @agent1/frontend exec playwright install --with-deps chromium

      - name: Playwright smoke
        env:
          PLAYWRIGHT_JUNIT_OUTPUT_NAME: playwright-junit.xml
          PLAYWRIGHT_JUNIT_OUTPUT_DIR: test-results
        run: pnpm --filter @agent1/frontend exec playwright test --project=chromium --reporter=line,junit,html

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr-frontend-playwright
          path: |
            apps/frontend/playwright-report
            apps/frontend/test-results

  environment-safety:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Environment safety checks
        run: |
          pytest -q \
            tests/test_runtime_scope_guard.py \
            tests/test_ingress_normalizer.py::test_normalizer_filters_dev_active_non_sandbox_scope \
            tests/test_ingress_normalizer.py::test_normalizer_accepts_dev_active_sandbox_scope \
            tests/test_mention_action_executor.py::test_mention_action_executor_shadow_mode_skips_write_side_effects \
            tests/test_mention_action_executor.py::test_mention_action_executor_shadow_mode_keeps_author_ci_no_write

  scenario-smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "apps/backend[dev]"

      - name: Scenario smoke harness
        run: python tests/scenarios/pr_smoke_run.py

      - name: Upload backend smoke artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: pr-backend-smoke
          path: tests/scenarios/artifacts/pr-smoke-backend-junit.xml

  operational-readiness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.10'

      - name: Operational readiness gate
        run: python tests/operations/run.py
